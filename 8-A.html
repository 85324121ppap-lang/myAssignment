<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YouTube風レイアウト</title>
  <link rel="stylesheet" href="8-A.css">
</head>
<body>

  <div class="youtube-container">
    
    <header>
      YouTude
    </header>

    <main class="content-area">
      
      <div class="main-video">
        動画再生エリア
      </div>

      <div class="video-info">
        <h2>動画タイトル</h2>
        <p style="color: #aaa; margin-top: 8px;">1.2億回視聴 • 2026/06/04</p>
        <hr style="border: 0; border-top: 1px solid #3d3d3d; margin: 12px 0;">
        <p>動画の概要欄テキスト</p>
      </div>

      <aside class="related-videos">
        <h3>関連動画</h3>
        
        <div class="video-card">
          <div class="thumbnail"></div>
          <div class="meta">
            <div class="meta-title">おすすめの動画タイトル1</div>
            <div class="meta-channel">チャンネル名</div>
          </div>
        </div>
        <div class="video-card">
          <div class="thumbnail"></div>
          <div class="meta">
            <div class="meta-title">おすすめの動画タイトル2</div>
            <div class="meta-channel">チャンネル名</div>
          </div>
        </div>
        <div class="video-card">
          <div class="thumbnail"></div>
          <div class="meta">
            <div class="meta-title">おすすめの動画タイトル3</div>
            <div class="meta-channel">チャンネル名</div>
          </div>
        </div>
      </aside>

    </main>
  </div>

</body>
</html>
