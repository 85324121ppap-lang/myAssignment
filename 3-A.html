<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>旅のプラン紹介</h1>
    <p>このページでは、人気の旅行プランとお申込みフォームを紹介します。</p>
    <h2>料金表</h2>
    <style>
  table,
  td,
  th {
    border: 1px solid black;
  }
</style>
    <table>
        <thead>
            <tr>
                <th>プラン名</th>
                <th>日数</th>
                <th>料金</th>
            </tr>
        </thead>
        <tr>
            <td>北海道満喫ツアー</td>
            <td>3日間</td>
            <td>55,000円</td>
        </tr>
        <tr>
            <td>沖縄リゾート</td>
            <td>4日間</td>
            <td>68,000円</td>
        </tr>
    </table>
    <h2>プラン内容</h2>
    <dl>
        <dt>宿泊</dt>
        <dd>提携ホテルまたは温泉旅館</dd>
    </dl>
    <dl>
        <dt>食事</dt>
        <dd>朝食・夕食付き</dd>
    </dl>
    <h2>お問い合わせフォーム</h2>
    <form action="#" method="get">
        <p>
            <label>お名前：<input type="text" name="name" /></label>
        </p>
        <p>
            <label>メールアドレス：<input type="email" name="email" /></label>
        </p>
        <p>
            <label>希望プラン：<select name="grade">
                <option value="1">北海道満喫ツアー</option>
                <option value="2">沖縄リゾート</option>
        
            </select>
        </label>
    </p>
    <p>
        <label for="meeting">希望日時を選択:</label>
        <input type="datetime-local" id="meeting" name="meeting"value="2026-05-07T10:00" min="2026-04-01T00:00" max="2027-3-31T23:59">
    </p>
    <p>
        <label>ご要望：<br />
        <textarea name="message" rows="4" cols="40"></textarea>
    </label>
    </p>
    <p>
        <label> <input type="checkbox" name="agree" /> 利用規約に同意する </label>
    </p>
    <p>
        <input type="submit" value="送信" />
    </p>
</form>
</body>
</html>
